<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1917"/>
      <stop offset="100%" stop-color="#0c0a09"/>
    </linearGradient>
    <linearGradient id="beer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="foam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fefce8"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="handle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Circle background -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)" stroke="#f59e0b" stroke-width="8"/>

  <!-- Mug body — slight taper -->
  <path d="M152 190 L160 400 Q162 420 180 420 L310 420 Q328 420 330 400 L338 190 Z"
        fill="url(#beer)" opacity="0.9"/>

  <!-- Beer liquid shine -->
  <rect x="170" y="210" width="20" height="160" rx="10" fill="#fefce8" opacity="0.18"/>

  <!-- Foam top — bubbly shape -->
  <path d="M148 195
           Q148 160 180 158
           Q200 140 225 152
           Q245 132 270 148
           Q295 135 315 155
           Q342 158 342 195
           Z"
        fill="url(#foam)" opacity="0.95"/>

  <!-- Foam bubbles -->
  <circle cx="200" cy="175" r="8" fill="#fefce8" opacity="0.5"/>
  <circle cx="260" cy="168" r="6" fill="#fefce8" opacity="0.4"/>
  <circle cx="300" cy="178" r="7" fill="#fefce8" opacity="0.45"/>
  <circle cx="230" cy="180" r="5" fill="#fefce8" opacity="0.35"/>

  <!-- Handle -->
  <path d="M338 210 Q395 210 395 280 Q395 350 338 350"
        fill="none" stroke="url(#handle)" stroke-width="24" stroke-linecap="round"/>
</svg>
